<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Practice</title>
  <style>
    body{
      font-family: "sans=serif";
    }
    input{
      text-align:center;
      display:block;
    }
    span{
      color:red;
    }
  </style>
</head>
<body>
  <p>Enter your name:<span>*</span></p>
  <input type="text" placeholder="Peter Williams">
  <p>Enter your email:<span>*</span></p>
  <input type="email" placeholder="example@gmail.com">
</body>
</html>
