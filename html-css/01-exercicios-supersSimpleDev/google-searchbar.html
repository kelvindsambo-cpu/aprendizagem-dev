<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Searchbar</title>
  <style>
    img{
      display: block;
      margin: 0 auto;
      object-fit: cover;
      height:100px;
    }
    input{
      display: block;
      border-radius: 30px;
      border: 1px solid #ccc;
      margin: 0 auto;
      width: 500px;
      height: 30px;
      padding: 0 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <img src="../pictures/Google-logo.png" alt="Google's logo">
  <input type="search" placeholder="Search Google or type a URL">
</body>
</html>
